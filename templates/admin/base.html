<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f6fa; color: #222; }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e6e6e6; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; margin-bottom: 12px; box-sizing: border-box; }
        button { background: #500060; color: #fff; border: 0; padding: 10px 14px; border-radius: 6px; cursor: pointer; }
        .btn-danger { background: #c62828; }
        .pagination { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
        .pagination a { text-decoration: none; color: #500060; border: 1px solid #ddd; padding: 6px 10px; border-radius: 6px; }
        .pagination .active { background: #500060; color: #fff; border-color: #500060; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 12px; }
        .flash.success { background: #e8f5e9; color: #1b5e20; }
        .flash.error { background: #ffebee; color: #b71c1c; }

        /* —— Admin top bar —— */
        .admin-nav {
            font-family: "Outfit", system-ui, sans-serif;
            background: linear-gradient(105deg, #3d0048 0%, #500060 42%, #6b2a7d 100%);
            color: #fff;
            box-shadow: 0 4px 24px rgba(80, 0, 96, 0.35);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .admin-nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            min-height: 68px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem 1.25rem;
        }

        .admin-nav-brand {
            display: inline-flex;
            align-items: baseline;
            gap: 0.35rem;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            padding: 0.35rem 0;
            margin-right: 0.5rem;
        }

        .admin-nav-brand span {
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            opacity: 0.75;
            color: rgba(255, 255, 255, 0.95);
        }

        .admin-nav-brand:hover {
            color: #fff;
            opacity: 0.92;
        }

        .admin-nav-links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.25rem;
            flex: 1;
        }

        .admin-nav-links a.nav-link {
            color: rgba(255, 255, 255, 0.92);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.65rem 1rem;
            border-radius: 10px;
            transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }

        .admin-nav-links a.nav-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .admin-nav-links a.nav-link.active {
            background: rgba(255, 255, 255, 0.22);
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .admin-nav-logout {
            margin-left: auto;
        }

        .admin-nav-logout button {
            font-family: "Outfit", system-ui, sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.55rem 1.15rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: none;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .admin-nav-logout button:hover {
            background: rgba(255, 255, 255, 0.24);
            border-color: rgba(255, 255, 255, 0.45);
        }

        @media (max-width: 640px) {
            .admin-nav-inner {
                padding: 12px 16px;
                min-height: auto;
            }

            .admin-nav-logout {
                margin-left: 0;
                width: 100%;
            }

            .admin-nav-logout button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    {% set ep = request.endpoint %}
    <nav class="admin-nav" aria-label="Admin main">
        <div class="admin-nav-inner">
            <a class="admin-nav-brand" href="{{ url_for('admin_views.dashboard') }}">Travaa <span>Admin</span></a>
            <div class="admin-nav-links">
                <a class="nav-link{% if ep == 'admin_views.dashboard' %} active{% endif %}" href="{{ url_for('admin_views.dashboard') }}">Dashboard</a>
                <a class="nav-link{% if ep in ('admin_views.services', 'admin_views.services_update_price') %} active{% endif %}" href="{{ url_for('admin_views.services') }}">Services</a>
                <a class="nav-link{% if ep in ('admin_views.bookings', 'admin_views.booking_view', 'admin_views.booking_delete') %} active{% endif %}" href="{{ url_for('admin_views.bookings') }}">Bookings</a>
                <a class="nav-link{% if ep in ('admin_views.about', 'admin_views.contact_us') %} active{% endif %}" href="{{ url_for('admin_views.about') }}">Contact Us</a>
                <a class="nav-link{% if ep in ('admin_views.blog', 'admin_views.blog_new', 'admin_views.blog_edit', 'admin_views.blog_save') %} active{% endif %}" href="{{ url_for('admin_views.blog') }}">Blog</a>
            </div>
            <form class="admin-nav-logout" method="post" action="{{ url_for('admin_views.logout') }}">
                <button type="submit">Logout</button>
            </form>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
